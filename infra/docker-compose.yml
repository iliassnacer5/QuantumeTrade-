# Stack Quantum Trade AI — entièrement dockerisée.
# Lancement : docker compose -f infra/docker-compose.yml up --build
# Variables lues depuis ../.env (créer depuis ../.env.example).
#
# Ports hôte choisis pour éviter les conflits avec des conteneurs déjà en cours :
#   - backend  -> 8080 (8000 souvent occupé)
#   - frontend -> 3000
#   - postgres/redis/redpanda : NON exposés sur l'hôte (réseau interne uniquement)
#     -> aucun conflit avec un Postgres/Redis déjà lancés sur 5432/6379.

name: quantum-trade-ai

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantum_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-quantum}
    # Pas de mapping de port hôte -> évite le conflit avec votre Postgres sur 5432.
    # Décommentez pour un accès debug depuis l'hôte (port 5433) :
    # ports:
    #   - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Interne uniquement (6379 souvent déjà pris). Accessible via "redis:6379" dans le réseau.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    # Interne uniquement.

  backend:
    build:
      context: ../backend
    # `.env` OPTIONNEL : la stack démarre même sans lui (défauts + dégradation gracieuse -> données
    # synthétiques tant que les clés API ne sont pas fournies). Copier ../.env.example -> ../.env
    # puis y mettre ses clés pour des données réelles.
    env_file:
      - path: ../.env
        required: false
    environment:
      # Active la persistance Postgres (au lieu de l'in-memory).
      USE_IN_MEMORY_DB: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantum}:${POSTGRES_PASSWORD:-quantum_dev_pwd}@postgres:5432/${POSTGRES_DB:-quantum}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # En déploiement public : CORS_ORIGINS=http://IP_PUBLIQUE:3000 (voir docs/DEPLOIEMENT.md)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: dev
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      args:
        # Inlinés au BUILD (Next.js NEXT_PUBLIC_*). Le navigateur appelle le backend sur 8080.
        # En déploiement public : PUBLIC_API_URL=http://IP_PUBLIQUE:8080 (rebuild requis).
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
